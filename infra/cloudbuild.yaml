steps:
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/rag-backend:$COMMIT_SHA", "./backend"]
    id: build-backend

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/rag-backend:$COMMIT_SHA"]
    id: push-backend
    waitFor: ["build-backend"]

  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - run
      - deploy
      - rag-backend
      - --image=gcr.io/$PROJECT_ID/rag-backend:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
    waitFor: ["push-backend"]

  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/rag-frontend:$COMMIT_SHA", "./frontend"]
    id: build-frontend

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/rag-frontend:$COMMIT_SHA"]
    id: push-frontend
    waitFor: ["build-frontend"]

  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - run
      - deploy
      - rag-frontend
      - --image=gcr.io/$PROJECT_ID/rag-frontend:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
    waitFor: ["push-frontend"]
